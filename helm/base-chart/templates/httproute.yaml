# helm/base-chart/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "base-chart.fullname" . }}-route
  labels:
    {{- include "base-chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: main-gateway
      namespace: infra
  hostnames:
    - "santiago.monster"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.route.path | default "/" }}
      backendRefs:
        - name: {{ include "base-chart.fullname" . }}
          port: {{ .Values.service.port }}