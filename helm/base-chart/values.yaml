# Valores por defecto para cualquier microservicio que use esta plantilla
replicaCount: 2

image:
  repository: "" 
  pullPolicy: IfNotPresent
  tag: ""       

service:
  type: ClusterIP
  port: 80

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi