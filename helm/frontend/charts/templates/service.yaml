apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-{{ .Values.global.namespace }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.labels.app }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.labels.app }}