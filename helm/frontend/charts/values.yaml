# Configuración global
global:
  namespace: frontend
# Configuración de la imagen
image:
  repository: acrdevmicroservices2026.azurecr.io/frontend
  tag: "v1.0.4"
  pullPolicy: IfNotPresent
# Configuración del servicio
service:
  type: ClusterIP
  port: 80
# Recursos del contenedor
resources:
  limits:
    cpu: 250m
  requests:
    cpu: 100m
# Réplicas
replicaCount: 1
# HPA configuración
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
# Labels
labels:
  app: frontend
  component: frontend
  tier: presentation
config:
  port: "80"
  authAddress: "http://microservices-auth-api-svc.microservices.svc.cluster.local:8081"
  todosAddress: "http://microservices-todos-api-svc.microservices.svc.cluster.local:8082"
#Linkerd annotations
annotations:
  linkerd.io/inject: enabled
#ServiceProfile configuration for Linkerd
serviceProfile:
  timeout: 5s
  isRetryable: true
  pathRegex: ".*"
  retryBudget:
    retryRatio: 0.2
    minRetriesPerSecond: 10
    ttl: 10s
