apiVersion: gateway.networking.k8s.io/v1
kind: {{ .Values.gateway.kind }}
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespaces }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    # Listener HTTP para pruebas
    - name: {{ .Values.gateway.listeners.name }}
      port: {{ .Values.gateway.listeners.port }}
      protocol: {{ .Values.gateway.listeners.protocol }}
      allowedRoutes:
        namespaces:
          from: {{ .Values.gateway.listeners.allowedRoutes.namespaces }}

    # Listener HTTPS usando DNS-01
    - name: {{ .Values.gateway.listeners.tls.name }}
      port: {{ .Values.gateway.listeners.tls.port }}
      protocol: {{ .Values.gateway.listeners.tls.protocol }}
      allowedRoutes:
        namespaces:
          from: {{ .Values.gateway.listeners.allowedRoutes.namespaces }}
      tls:
        mode: {{ .Values.gateway.listeners.tls.mode }}
        certificateRefs:
          - name: {{ .Values.gateway.listeners.tls.certificateRefs.name }}
            kind: {{ .Values.gateway.listeners.tls.certificateRefs.kind }}
            group: {{ .Values.gateway.listeners.tls.certificateRefs.group }}
