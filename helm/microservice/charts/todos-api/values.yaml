# Configuración global
global:
  namespace: microservices

# Configuración del ConfigMap
config:
  # Puerto del servicio
  todoApiPort: "8082"
  # Configuración de Redis para Pub/Sub
  redisHost: "redis"
  redisPort: "6379"
  redisChannel: "log_channel"
  # URL de Zipkin para distributed tracing
  zipkinUrl: "http://zipkin:9411/api/v2/spans"
  # Configuración de Node.js
  nodeEnv: "production"
  # Nombre del servicio para Zipkin tracing
  serviceName: "todos-api"
  # Configuración de logging
  logLevel: "info"
  # Configuración de Zipkin Context (CLS)
  zipkinContext: "zipkin"

# Configuración de la imagen
image:
  repository: todos-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Configuración del servicio
service:
  type: ClusterIP
  port: 8082

# Recursos del contenedor
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "200m"

# Réplicas
replicaCount: 1

# Labels
labels:
  app: todos-api
  component: backend
  tier: application
