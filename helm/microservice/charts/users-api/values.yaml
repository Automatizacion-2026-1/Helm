# Configuración global
global:
  namespace: microservices

config:
  # Puerto del servidor
  serverPort: "8083"

# Configuración de la imagen
image:
  repository: barcino/users-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Configuración del servicio
service:
  type: ClusterIP
  port: 8083

# Recursos del contenedor
resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "750Mi"
    cpu: "500m"

# Réplicas
replicaCount: 1

# HPA configuración
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Labels
labels:
  app: users-api

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false