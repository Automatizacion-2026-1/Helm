apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s-svc" .Release.Name .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.labels.app }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}