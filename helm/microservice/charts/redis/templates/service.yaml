apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.namespace }}-{{ .Chart.Name }}-svc
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.labels.app }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}