global:
  namespace: microservices

# Configuración del ConfigMap
config:
  authApiPort: "8081"
  usersApiAddress: "http://microservices-users-api-svc.microservices.svc.cluster.local:8083"

# Configuración de la imagen
image:
  repository: barcino/auth-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Configuración del servicio
service:
  type: ClusterIP
  port: 8081

# Recursos del contenedor
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Réplicas
replicaCount: 1

# Labels
labels:
  app: auth-api
