# Configuración global
global:
  namespace: microservices

# Configuración del ConfigMap
config:
  # Puerto del servicio
  authApiPort: "8081"
  # URL del servicio de usuarios interno
  usersApiAddress: "http://users-api:8083"
  # URL de Zipkin para distributed tracing
  zipkinUrl: "http://zipkin:9411/api/v2/spans"
  # Nombre del servicio para tracing
  serviceName: "auth-api"
  # Usuarios permitidos (formato: username_password)
  allowedUserHashes: "admin_admin,johnd_foo,janed_ddd"

# Configuración de la imagen
image:
  repository: auth-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Configuración del servicio
service:
  type: ClusterIP
  port: 8081

# Recursos del contenedor
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Réplicas
replicaCount: 1

# Labels
labels:
  app: auth-api
  component: backend
  tier: authentication
