# Deployment para Auth API (Go)
apiVersion: apps/v1
kind: Deployment
metadata:
  # CAMBIO: Usamos Release.Name para consistencia con ArgoCD
  name: {{ printf "%s-%s" .Release.Name .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.labels.app }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.labels.app }}
  template:
    metadata:
      annotations:
        {{- with .Values.annotations }}
        {{ toYaml . | indent 8 }}
        {{- end }}
      labels:
        app: {{ .Values.labels.app }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        envFrom:
        - configMapRef:
            # CAMBIO: Nombre dinámico consistente
            name: {{ printf "%s-%s-config" .Release.Name .Chart.Name }}
        - secretRef:
            # CAMBIO: Nombre dinámico consistente
            name: {{ printf "%s-%s-secret" .Release.Name .Chart.Name }}