# Configuración global
global:
  namespace: microservices

# Configuración del ConfigMap
config:
  # Configuración de Redis para Pub/Sub
  redisHost: "microservices-redis-svc.microservices.svc.cluster.local"
  redisPort: "6379"
  redisChannel: "log_channel"

# Configuración de la imagen
image:
  repository: barcino/logs
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Recursos del contenedor
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Réplicas
replicaCount: 1

# HPA configuración
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Labels
labels:
  app: log-processor

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
