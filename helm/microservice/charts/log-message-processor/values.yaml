# Configuración global
global:
  namespace: microservices

# Configuración del ConfigMap
config:
  # Configuración de Redis para Pub/Sub
  redisHost: "redis"
  redisPort: "6379"
  redisChannel: "log_channel"
  redisDb: "0"
  # URL de Zipkin para distributed tracing
  zipkinUrl: "http://zipkin:9411/api/v2/spans"
  # Nombre del servicio para Zipkin tracing
  serviceName: "log-message-processor"
  # Configuración de Python
  pythonUnbuffered: "1"
  pythonIoEncoding: "utf-8"
  # Configuración de logging
  logLevel: "INFO"
  # Configuración de delay aleatorio (en ms)
  maxDelayMs: "2000"
  minDelayMs: "0"

# Configuración de la imagen
image:
  repository: log-message-processor
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Recursos del contenedor
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Réplicas
replicaCount: 1

# Labels
labels:
  app: log-processor
  component: worker
  tier: processing
