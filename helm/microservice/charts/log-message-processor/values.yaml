# Configuración global
global:
  namespace: microservices
# Configuración del ConfigMap
config:
  # Configuración de Redis para Pub/Sub
  redisHost: "microservices-redis-svc.microservices.svc.cluster.local"
  redisPort: "6379"
  redisChannel: "log_channel"
# Configuración de la imagen
image:
  repository: acrdevmicroservices2026.azurecr.io/log-message-processor
  tag: "v1.0.4"
  pullPolicy: IfNotPresent
# Recursos del contenedor
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
# Réplicas
replicaCount: 1
# HPA configuración
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
# Labels
labels:
  app: log-processor
#Linkerd annotations
annotations:
  linkerd.io/inject: enabled
#ServiceProfile configuration for Linkerd
serviceProfile:
  timeout: 5s
  isRetryable: true
  pathRegex: ".*"
  retryBudget:
    retryRatio: 0.2
    minRetriesPerSecond: 10
    ttl: 10s
