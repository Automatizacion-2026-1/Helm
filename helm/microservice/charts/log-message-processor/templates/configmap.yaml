apiVersion: v1
kind: ConfigMap
metadata:
  name: log-processor-config
  namespace: microservices
  labels:
    app: log-processor
    component: worker
    tier: processing
data:
  # Configuración de Redis para Pub/Sub
  REDIS_HOST: {{ .Values.config.redisHost }}
  REDIS_PORT: {{ .Values.config.redisPort }}
  REDIS_CHANNEL: {{ .Values.config.redisChannel }}
  REDIS_DB: {{ .Values.config.redisDb }}
  
  # URL de Zipkin para distributed tracing
  ZIPKIN_URL: {{ .Values.config.zipkinUrl }}
  
  # Nombre del servicio para Zipkin tracing
  SERVICE_NAME: {{ .Values.config.serviceName }}
  
  # Configuración de Python
  PYTHONUNBUFFERED: {{ .Values.config.pythonUnbuffered }}
  PYTHONIOENCODING: {{ .Values.config.pythonIoEncoding }}
  
  # Configuración de logging
  LOG_LEVEL: {{ .Values.config.logLevel }}
  
  # Configuración de delay aleatorio (en ms)
  MAX_DELAY_MS: {{ .Values.config.maxDelayMs }}
  MIN_DELAY_MS: {{ .Values.config.minDelayMs }}