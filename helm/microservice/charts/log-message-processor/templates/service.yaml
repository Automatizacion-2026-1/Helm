# Service para Log Message Processor
apiVersion: v1
kind: Service
metadata:
  # CAMBIO: Usamos Release.Name
  name: {{ printf "%s-%s-svc" .Release.Name .Chart.Name | quote }}
  namespace: {{ .Values.global.namespace | quote }}
  labels:
    app: {{ .Values.labels.app | quote }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.labels.app | quote }}
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http