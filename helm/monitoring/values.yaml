# ============================================================
# PROMETHEUS STANDALONE
# Includes: Prometheus, AlertManager, node-exporter,
# kube-state-metrics
# ============================================================
prometheus:
  # ── SERVER ──
  server:
    retention: "1d"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
    persistentVolume:
      enabled: true
      storageClass: "default"
      size: 10Gi
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

  # ── ALERTMANAGER ──
  alertmanager:
    enabled: true
    config:
      global:
        smtp_smarthost: "smtp.gmail.com:587"
        smtp_from: ""
        smtp_auth_username: ""
        smtp_auth_password: ""
        smtp_require_tls: true
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "email-alerts"
        routes:
          - matchers:
              - "severity = critical"
            receiver: "email-alerts"
            group_wait: 10s
            repeat_interval: 1h
          - matchers:
              - "severity = warning"
            receiver: "email-alerts"
            group_wait: 1m
            repeat_interval: 4h
      receivers:
        - name: "email-alerts"
          email_configs:
            - to: ""
              send_resolved: true
    persistentVolume:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # ── ALERTAS PERSONALIZADAS ──
  serverFiles:
    alerting_rules.yml:
      groups:
        - name: service-availability
          rules:
            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.pod }} está en CrashLoop"
                description: >-
                  El pod {{ $labels.pod }} en namespace
                  {{ $labels.namespace }} se está reiniciando
                  constantemente.
            - alert: DeploymentUnavailable
              expr: kube_deployment_status_replicas_unavailable > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Deployment {{ $labels.deployment }} no disponible"
                description: >-
                  El deployment {{ $labels.deployment }} tiene
                  {{ $value }} réplicas no disponibles.
            - alert: PodNotReady
              expr: >-
                kube_pod_status_ready{condition="false"} == 1
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.pod }} no está Ready"
                description: >-
                  El pod {{ $labels.pod }} en namespace
                  {{ $labels.namespace }} lleva más de 10 minutos
                  sin estar Ready.
        - name: resource-usage
          rules:
            - alert: HighCPUUsage
              expr: >-
                sum(rate(container_cpu_usage_seconds_total{
                  container!=""}[5m])) by (pod, namespace)
                / sum(kube_pod_container_resource_limits{
                  resource="cpu"}) by (pod, namespace) > 0.85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Alto uso de CPU en {{ $labels.pod }}"
                description: >-
                  El pod {{ $labels.pod }} en namespace
                  {{ $labels.namespace }} está usando más del
                  85% de su límite de CPU.
            - alert: HighMemoryUsage
              expr: >-
                sum(container_memory_working_set_bytes{
                  container!=""}) by (pod, namespace)
                / sum(kube_pod_container_resource_limits{
                  resource="memory"}) by (pod, namespace) > 0.85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Alto uso de memoria en {{ $labels.pod }}"
                description: >-
                  El pod {{ $labels.pod }} en namespace
                  {{ $labels.namespace }} está usando más del
                  85% de su límite de memoria.
            - alert: NodeMemoryPressure
              expr: >-
                kube_node_status_condition{
                  condition="MemoryPressure",status="true"} == 1
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Nodo {{ $labels.node }} bajo presión de memoria"
                description: >-
                  El nodo {{ $labels.node }} está reportando
                  MemoryPressure.
        - name: latency
          rules:
            - alert: HighLatency
              expr: >-
                histogram_quantile(0.95,
                  sum(rate(http_request_duration_seconds_bucket[5m]))
                  by (le, service, namespace)) > 2
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Alta latencia en {{ $labels.service }}"
                description: >-
                  El servicio {{ $labels.service }} en namespace
                  {{ $labels.namespace }} tiene p95 de latencia
                  mayor a 2 segundos.
            - alert: HighErrorRate
              expr: >-
                sum(rate(http_requests_total{status=~"5.."}[5m]))
                by (service, namespace)
                / sum(rate(http_requests_total[5m]))
                by (service, namespace) > 0.05
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Alta tasa de errores en {{ $labels.service }}"
                description: >-
                  El servicio {{ $labels.service }} tiene más del
                  5% de respuestas 5xx.

  # ── NODE EXPORTER ──
  nodeExporter:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

  # ── KUBE STATE METRICS ──
  kube-state-metrics:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

  # ── PUSHGATEWAY ──
  pushgateway:
    enabled: false

# ============================================================
# GRAFANA
# ============================================================
grafana:
  adminPassword: "admin123"

  service:
    type: ClusterIP

  persistence:
    enabled: true
    storageClass: "default"
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus-server
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://monitoring-loki:3100
          access: proxy
          isDefault: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      loki-logs:
        gnetId: 13639  #15141
        revision: 1
        datasource: Loki

# ============================================================
# LOKI
# ============================================================
loki:
  deploymentMode: SingleBinary

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 24h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    persistence:
      enabled: true
      storageClass: "default"
      size: 5Gi

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false

# ============================================================
# FLUENT BIT
# ============================================================
fluent-bit:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  config:

    service: |
      [SERVICE]
          Flush        1
          Daemon       Off
          Log_Level    info
          Parsers_File parsers.conf
          HTTP_Server  On
          HTTP_Listen  0.0.0.0
          HTTP_Port    2020

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          Parser            cri
          Tag               kube.*
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On 
      
      [INPUT]
          Name tail
          Path /var/log/containers/*istio-proxy*.log
          Tag istio.*
          Parser cri

      [INPUT]
          Name tail
          Path /var/log/containers/*app*.log
          Tag app.*
          Parser cri

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     kube.var.log.containers.
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off
      
      [FILTER]
          Name               record_modifier
          Match              kube.*
          Record             cluster   CLUSTER_PLACEHOLDER
          Record             namespace ${kubernetes['namespace_name']}
          Record             container ${kubernetes['container_name']}
          Record             pod       ${kubernetes['pod_name']}
    outputs: |
      [OUTPUT]
          Name                    loki
          Match                   kube.*
          Host                    monitoring-loki
          Port                    3100
          labels                  job=fluent-bit
          label_keys              $cluster,$namespace,$container,$pod  
          Auto_Kubernetes_Labels  off