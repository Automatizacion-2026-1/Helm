apiVersion: gateway.networking.k8s.io/v1
kind: {{ .Values.httpRoute.kind }}
metadata:
  name: {{ .Values.httpRoute.metadata.name }}
  namespace: {{ .Values.httpRoute.metadata.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentRefs.name }}
      namespace: {{ .Values.httpRoute.parentRefs.namespace }}
  hostnames:
    - "linkerd.santiago.monster"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: {{ .Values.httpRoute.service.name }}
          namespace: linkerd-viz
          port: {{ .Values.httpRoute.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.httpRoute.service.name }}
          namespace: linkerd-viz
          port: {{ .Values.httpRoute.service.port }}