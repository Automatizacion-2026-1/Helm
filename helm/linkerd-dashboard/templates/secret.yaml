apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: {{ .Values.httpRoute.metadata.namespace }}
type: Opaque
stringData:
  client-id: {{ .Values.secret.clientId | quote }}
  client-secret: {{ .Values.secret.clientSecret | quote }}
  cookie-secret: {{ .Values.secret.cookieSecret | quote }}