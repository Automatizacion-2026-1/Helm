apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      annotations:
        linkerd.io/inject: {{ index .Values "oauth2-proxy" "podAnnotations" "linkerd.io/inject" | quote }}
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=azure
            - --azure-tenant={{ index .Values "oauth2-proxy" "extraArgs" "azure-tenant" }}
            - --allowed-group={{ index .Values "oauth2-proxy" "extraArgs" "allowed-group" }}
            - --upstream={{ index .Values "oauth2-proxy" "extraArgs" "upstream" }}
            - --redirect-url={{ index .Values "oauth2-proxy" "extraArgs" "redirect-url" }}
            - --email-domain={{ index .Values "oauth2-proxy" "extraArgs" "email-domain" }}
            - --skip-provider-button={{ index .Values "oauth2-proxy" "extraArgs" "skip-provider-button" }}
            - --cookie-secure={{ index .Values "oauth2-proxy" "extraArgs" "cookie-secure" }}
            - --http-address=0.0.0.0:4180
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: cookie-secret
          ports:
            - containerPort: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
  type: ClusterIP