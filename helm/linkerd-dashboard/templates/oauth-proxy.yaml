apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      annotations:
        linkerd.io/inject: {{ index .Values "oauth2-proxy" "podAnnotations" "linkerd.io/inject" | quote }}
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ printf "https://login.microsoftonline.com/%s/v2.0" .Values.tenantId }}
            - --upstream={{ index .Values "oauth2-proxy" "extraArgs" "upstream" }}
            - --redirect-url={{ index .Values "oauth2-proxy" "extraArgs" "redirect-url" }}
            - --user-id-claim={{ index .Values "oauth2-proxy" "extraArgs" "user-id-claim" }}
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --skip-provider-button={{ index .Values "oauth2-proxy" "extraArgs" "skip-provider-button" }}
            - --session-cookie-minimal={{ index .Values "oauth2-proxy" "extraArgs" "session-cookie-minimal" }}
            - --http-address=0.0.0.0:4180
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ index .Values "oauth2-proxy" "config" "existingSecret" }}
                  key: cookie-secret
          ports:
            - containerPort: 4180
          volumeMounts:
            - name: emails
              mountPath: /etc/oauth2-proxy
      volumes:
        - name: emails
          configMap:
            name: oauth2-proxy-emails
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: linkerd-viz
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
  type: ClusterIP