oauth2-proxy:
  podAnnotations:
    linkerd.io/inject: enabled
  config:
    existingSecret: oauth2-proxy-secret
  extraArgs:
    azure-tenant: ""                    # se pasa en el pipeline
    upstream: http://web.linkerd-viz.svc.cluster.local:8084
    redirect-url: https://linkerd.santiago.monster/oauth2/callback
    email-domain: "icesi.edu.co"
    skip-provider-button: true
    session-cookie-minimal: true

secret:
  clientId: ""                          # se pasa en el pipeline
  clientSecret: ""                      # se pasa en el pipeline
  cookieSecret: ""                      # se pasa en el pipeline

httpRoute:
  kind: HTTPRoute
  metadata:
    name: http-route-linkerd
    namespace: linkerd-viz
  parentRefs:
    name: frontend-gateway
    namespace: gateway-infra
  hostname: "linkerd.santiago.monster"
  service:
    name: oauth2-proxy
    port: 4180

referenceGrant:
  name: linkerd-gateway-ref
  namespace: linkerd-viz
  fromNamespace: gateway-infra