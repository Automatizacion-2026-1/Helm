apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todos-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Automatizacion-2026-1/helm.git'
    targetRevision: fix/helm-problems
    path: helm/microservice/charts/todos-api
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true