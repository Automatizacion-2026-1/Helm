apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: santiago-monster-cert
  namespace: gateway-infra
spec:
  secretName: santiago-wildcard-tls
  issuerRef:
    name: letsencrypt-azure-dns
    kind: ClusterIssuer
  dnsNames:
    - "*.santiago.monster"
    - "santiago.monster"
