apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    email: shernandezsaavedra2004@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns-key
    solvers:
      - dns01:
          godaddy:
            apiKeySecretRef:
              name: godaddy-secret
              key: api-key
            apiSecretSecretRef:
              name: godaddy-secret
              key: api-secret