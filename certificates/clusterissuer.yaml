apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http
spec:
  acme:
    email: shernandezsaavedra2004@gmail.com     # tu email personal o de dominio
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-http-key     # cert-manager creará esto
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: frontend-gateway   # nombre del Gateway API que ya tienes
            namespace: gateway-infra # namespace donde está el gateway